services:
  webui:
    build:
      context: .
    env_file:
      - ./.env
    environment:
      WEBUI_APP_NAME: Lakmus
      WEBUI_AUTH_URL: http://auth-service.local
      WEBUI_SERVICE_A_URL: http://service-a:8089
      WEBUI_BASE_URL: http://localhost:8090
    ports:
      - "8090:8090"
    depends_on:
      service-a:
        condition: service_started
    networks:
      - lakmus-net

  service-a:
    build:
      context: ./Playground
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      FILE_TTL_HOURS: "4"
      KAFKA_REST_URL: http://kafka-rest:8082
      KAFKA_TOPIC_REQUEST: Request
    ports:
      - "8089:8089"
    depends_on:
      kafka-rest:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - lakmus-net

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: worker
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - lakmus-net

  service-b:
    build:
      context: ./service_B3
    environment:
      APP_CONFIG_PATH: /app/config.yaml
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_RESPONSE_TOPIC: Response
      KAFKA_REQUEST_TOPIC: Request
      POSTGRES_DSN: postgresql://service_b:service_b@postgres:5432/service_b
      WEBUI_BASE_URL: http://webui:8090
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      webui:
        condition: service_started
    volumes:
      - ./service_B3/config.yaml:/app/config.yaml:ro
    networks:
      - lakmus-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - lakmus-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CREATE_TOPICS: "Request,Response"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - lakmus-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - lakmus-net

  kafka-rest:
    image: confluentinc/cp-kafka-rest:7.6.1
    depends_on:
      - kafka
    ports:
      - "8082:8082"
    environment:
      KAFKA_REST_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      KAFKA_REST_LISTENERS: http://0.0.0.0:8082
      KAFKA_REST_HOST_NAME: kafka-rest
    networks:
      - lakmus-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: service_b
      POSTGRES_USER: service_b
      POSTGRES_PASSWORD: service_b
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U service_b -d service_b"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lakmus-net

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - lakmus-net

volumes:
  postgres_data:
  minio_data:

networks:
  lakmus-net:
